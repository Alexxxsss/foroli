<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>✨ My Cute Anime Game Hub ✨</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', 'Poppins', cursive;
      background: linear-gradient(135deg, #ffd6ec, #c2f0ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.8);
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      color: #ff69b4;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(45deg, #ff9a9e, #fad0c4);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      width: 200px;
    }

    .btn:hover {
      transform: scale(1.1);
      background: linear-gradient(45deg, #a18cd1, #fbc2eb);
    }

    .sparkle {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌸 Anime Game Hub 🌸</h1>
    <p class="sparkle">✨ Choose your adventure ✨</p>

    <button class="btn" onclick="location.href='game01.html'">🎮 Game 1</button>
    <button class="btn" onclick="location.href='game02.html'">🎮 Game 2</button>
  </div>
</body>
</html>
